<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptown Cash Buyers LLC — Weekly KPI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
            --bg-primary: #0F1419;
            --bg-card: #1A202C;
            --bg-input: #374151;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-success: #00D97E;
            --accent-danger: #FF4757;
            --accent-cyan: #0EA5E9;
            --accent-blue: #3B82F6;
            --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 32px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            gap: 32px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .week-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .week-selector-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .week-selector select {
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }

        .week-selector select:hover {
            border-color: var(--accent-cyan);
        }

        .week-selector select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        /* Metrics Row */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .metric-card {
            background-color: var(--bg-card);
            border: 1.5px solid;
            border-image: linear-gradient(180deg, rgba(100, 180, 255, 0.4) 0%, rgba(100, 180, 255, 0) 100%) 1;
            box-shadow: var(--shadow-sm);
            border-radius: 14px;
            padding: 24px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .metric-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 12px 32px rgba(14, 165, 233, 0.15);
        }

        .metric-card.primary {
            border-top: 4px solid var(--accent-success);
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .metric-icon {
            font-size: 56px;
            position: absolute;
            top: 10px;
            right: 14px;
            opacity: 0.7;
        }

        .metric-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1;
        }

        .metric-change {
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            padding: 2px 0;
        }

        .metric-change.up {
            color: var(--accent-success);
        }

        .metric-change.down {
            color: var(--accent-danger);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .chart-card {
            background-color: var(--bg-card);
            border: 1.5px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            border-radius: 14px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 12px 32px rgba(14, 165, 233, 0.1);
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .chart-canvas {
            position: relative;
            height: 420px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--bg-card);
            border: 1.5px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .comparison-section {
            background-color: var(--bg-card);
            border: 1.5px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .comparison-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .comparison-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .comparison-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .comparison-delta {
            font-size: 12px;
            margin-top: 8px;
            font-weight: 600;
        }

        .comparison-delta.positive {
            color: var(--accent-success);
        }

        .comparison-delta.negative {
            color: var(--accent-danger);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                margin-bottom: 24px;
                padding-bottom: 20px;
            }

            .header-left h1 {
                font-size: 22px;
            }

            .header-controls {
                width: 100%;
            }

            .week-selector {
                width: 100%;
                justify-content: space-between;
            }

            .week-selector select {
                flex: 1;
            }

            .metrics-row {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .charts-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .metric-value {
                font-size: 2.5rem;
            }

            .chart-canvas {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>Uptown Cash Buyers LLC</h1>
                <div class="header-subtitle">Weekly Performance Analytics</div>
            </div>
            <div class="header-controls">
                <div class="week-selector">
                    <span class="week-selector-label">Week</span>
                    <select id="weekSelect"></select>
                </div>
            </div>
        </div>

        <div id="content"></div>
    </div>

    <script>
        // ========================================
        // EDIT YOUR DATA HERE
        // ========================================
        const kpiData = [
  {
    "weekStart": "2026-04-06",
    "weekLabel": "Apr 6, 2026 - Apr 12, 2026",
    "totalLeads": 16,
    "dials": 145,
    "convos": 3,
    "pickUps": 19,
    "bookedAppointments": 0,
    "answerRate": 2.07,
    "convToBooking": 0.00
  },
  {
    "weekStart": "2026-04-13",
    "weekLabel": "Apr 13, 2026 - Apr 19, 2026",
    "totalLeads": 11,
    "dials": 67,
    "convos": 0,
    "pickUps": 9,
    "bookedAppointments": 0,
    "answerRate": 0.00,
    "convToBooking": 0.00
  },
  {
    "weekStart": "2026-04-27",
    "weekLabel": "Apr 27, 2026 - May 3, 2026",
    "totalLeads": 33,
    "dials": 2039,
    "convos": 6,
    "pickUps": 85,
    "bookedAppointments": 0,
    "answerRate": 0.29,
    "convToBooking": 0.00
  },
  {
    "weekStart": "2026-05-04",
    "weekLabel": "May 4, 2026 - May 10, 2026",
    "totalLeads": 18,
    "dials": 1831,
    "convos": 6,
    "pickUps": 80,
    "bookedAppointments": 0,
    "answerRate": 0.33,
    "convToBooking": 0.00
  },
  {
    "weekStart": "2026-05-11",
    "weekLabel": "May 11, 2026 - May 17, 2026",
    "totalLeads": 20,
    "dials": 1242,
    "convos": 4,
    "pickUps": 4,
    "bookedAppointments": 1,
    "answerRate": 0.32,
    "convToBooking": 25.0
  }
];
        // ========================================

        let currentWeekIndex = kpiData.length - 1;
        let charts = {};

        function getCurrentWeek() {
            return kpiData[currentWeekIndex];
        }

        function getPreviousWeek() {
            return currentWeekIndex > 0 ? kpiData[currentWeekIndex - 1] : null;
        }

        function getChangePercent(current, previous) {
            if (!previous || previous === 0) return 0;
            return ((current - previous) / previous * 100).toFixed(0);
        }

        function initWeekSelector() {
            const select = document.getElementById('weekSelect');
            kpiData.forEach((week, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = week.weekLabel;
                select.appendChild(option);
            });
            select.value = currentWeekIndex;
            select.addEventListener('change', (e) => {
                currentWeekIndex = parseInt(e.target.value);
                render();
            });
        }

        function render() {
            const week = getCurrentWeek();
            const prev = getPreviousWeek();
            const content = document.getElementById('content');
            let html = '';

            // Top Metrics Row (4 KPIs)
            html += '<div class="metrics-row">';

            // Total Leads
            const leadsChange = prev ? getChangePercent(week.totalLeads, prev.totalLeads) : 0;
            html += `
                <div class="metric-card primary">
                    <div class="metric-icon">📞</div>
                    <div>
                        <div class="metric-label">New Leads</div>
                        <div class="metric-value">${week.totalLeads}</div>
                        <div class="metric-change ${leadsChange >= 0 ? 'up' : 'down'}">
                            ${leadsChange >= 0 ? '↑' : '↓'} ${Math.abs(leadsChange)}% vs last week
                        </div>
                    </div>
                </div>
            `;

            // Dials
            const dialsChange = prev ? getChangePercent(week.dials, prev.dials) : 0;
            html += `
                <div class="metric-card">
                    <div class="metric-icon">📱</div>
                    <div>
                        <div class="metric-label">Dials</div>
                        <div class="metric-value">${week.dials.toLocaleString()}</div>
                        <div class="metric-change ${dialsChange >= 0 ? 'up' : 'down'}">
                            ${dialsChange >= 0 ? '↑' : '↓'} ${Math.abs(dialsChange)}% vs last week
                        </div>
                    </div>
                </div>
            `;

            // Conversations
            const convosChange = prev ? getChangePercent(week.convos, prev.convos) : 0;
            html += `
                <div class="metric-card">
                    <div class="metric-icon">💬</div>
                    <div>
                        <div class="metric-label">Conversations</div>
                        <div class="metric-value">${week.convos}</div>
                        <div class="metric-change ${convosChange >= 0 ? 'up' : 'down'}">
                            ${convosChange >= 0 ? '↑' : '↓'} ${Math.abs(convosChange)}% vs last week
                        </div>
                    </div>
                </div>
            `;

            // Booked Appointments
            const bookedChange = prev ? getChangePercent(week.bookedAppointments, prev.bookedAppointments) : 0;
            html += `
                <div class="metric-card primary">
                    <div class="metric-icon">✅</div>
                    <div>
                        <div class="metric-label">Booked Appointments</div>
                        <div class="metric-value">${week.bookedAppointments}</div>
                        <div class="metric-change ${bookedChange >= 0 ? 'up' : 'down'}">
                            ${bookedChange >= 0 ? '↑' : '↓'} ${Math.abs(bookedChange)}% vs last week
                        </div>
                    </div>
                </div>
            `;

            html += '</div>';

            // Charts Section
            html += '<div class="charts-grid">';
            html += '<div class="chart-card"><div class="chart-title">Dials Trend</div><div class="chart-canvas"><canvas id="dialsChart"></canvas></div></div>';
            html += '<div class="chart-card"><div class="chart-title">Sales Funnel (This Week)</div><div class="chart-canvas small"><canvas id="funnelChart"></canvas></div></div>';
            html += '<div class="chart-card"><div class="chart-title">Answer Rate % Trend</div><div class="chart-canvas"><canvas id="answerRateChart"></canvas></div></div>';
            html += '<div class="chart-card"><div class="chart-title">Conversion to Booking % Trend</div><div class="chart-canvas"><canvas id="convBookingChart"></canvas></div></div>';
            html += '</div>';

            // Key Metrics Stats
            html += '<div class="stats-grid">';
            html += `<div class="stat-card"><div class="stat-label">Pick Ups</div><div class="stat-value">${week.pickUps}</div><div class="stat-subtitle">This week</div></div>`;
            html += `<div class="stat-card"><div class="stat-label">Answer Rate %</div><div class="stat-value">${week.answerRate.toFixed(1)}%</div><div class="stat-subtitle">This week</div></div>`;
            html += `<div class="stat-card"><div class="stat-label">Conv to Booking %</div><div class="stat-value">${week.convToBooking.toFixed(1)}%</div><div class="stat-subtitle">This week</div></div>`;
            html += '</div>';

            // Week-over-week Comparison
            if (prev) {
                html += `
                    <div class="comparison-section">
                        <div class="section-title">Week-over-Week Comparison</div>
                        <div class="comparison-grid">
                            <div class="comparison-item">
                                <div class="comparison-label">Dials</div>
                                <div class="comparison-value">${week.dials.toLocaleString()}</div>
                                <div class="comparison-delta ${week.dials >= prev.dials ? 'positive' : 'negative'}">
                                    ${week.dials >= prev.dials ? '↑' : '↓'} ${Math.abs(getChangePercent(week.dials, prev.dials))}%
                                </div>
                            </div>
                            <div class="comparison-item">
                                <div class="comparison-label">Convos</div>
                                <div class="comparison-value">${week.convos}</div>
                                <div class="comparison-delta ${week.convos >= prev.convos ? 'positive' : 'negative'}">
                                    ${week.convos >= prev.convos ? '↑' : '↓'} ${Math.abs(getChangePercent(week.convos, prev.convos))}%
                                </div>
                            </div>
                            <div class="comparison-item">
                                <div class="comparison-label">Pick Ups</div>
                                <div class="comparison-value">${week.pickUps}</div>
                                <div class="comparison-delta ${week.pickUps >= prev.pickUps ? 'positive' : 'negative'}">
                                    ${week.pickUps >= prev.pickUps ? '↑' : '↓'} ${Math.abs(getChangePercent(week.pickUps, prev.pickUps))}%
                                </div>
                            </div>
                            <div class="comparison-item">
                                <div class="comparison-label">Booked</div>
                                <div class="comparison-value">${week.bookedAppointments}</div>
                                <div class="comparison-delta ${week.bookedAppointments >= prev.bookedAppointments ? 'positive' : 'negative'}">
                                    ${week.bookedAppointments >= prev.bookedAppointments ? '↑' : '↓'} ${Math.abs(getChangePercent(week.bookedAppointments, prev.bookedAppointments))}%
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html;

            setTimeout(() => {
                renderDialsChart();
                renderFunnelChart();
                renderAnswerRateChart();
                renderConvBookingChart();
            }, 100);
        }

        function renderDialsChart() {
            const ctx = document.getElementById('dialsChart');
            if (!ctx) return;
            if (charts.dials) charts.dials.destroy();

            const labels = kpiData.map(w => w.weekLabel);
            const values = kpiData.map(w => w.dials);

            charts.dials = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Dials',
                        data: values,
                        borderColor: '#0EA5E9',
                        backgroundColor: 'rgba(14, 165, 233, 0.08)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 5,
                        pointBackgroundColor: '#0EA5E9',
                        pointBorderColor: '#1A202C',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, filler: { propagate: true } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.08)', drawBorder: false },
                            ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 } }
                        },
                        x: {
                            ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 }, maxRotation: -45, minRotation: -45 },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderFunnelChart() {
            const ctx = document.getElementById('funnelChart');
            if (!ctx) return;
            if (charts.funnel) charts.funnel.destroy();

            const week = getCurrentWeek();
            const data = [week.dials, week.convos, week.pickUps, week.bookedAppointments];
            const labels = ['Dials', 'Convos', 'Pick Ups', 'Booked'];
            const colors = ['#0EA5E9', '#3B82F6', '#EC4899', '#00D97E'];

            charts.funnel = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Count', data, backgroundColor: colors, borderRadius: 6, borderSkipped: false, barPercentage: 0.7 }] },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.08)', drawBorder: false }, ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 } } },
                        y: { ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 } }, grid: { display: false } }
                    }
                }
            });
        }

        function renderAnswerRateChart() {
            const ctx = document.getElementById('answerRateChart');
            if (!ctx) return;
            if (charts.answerRate) charts.answerRate.destroy();

            const labels = kpiData.map(w => w.weekLabel);
            const values = kpiData.map(w => w.answerRate);

            charts.answerRate = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Answer Rate %', data: values, borderColor: '#00D97E', backgroundColor: 'rgba(0, 217, 126, 0.08)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#00D97E', pointBorderColor: '#1A202C', pointBorderWidth: 2 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255, 255, 255, 0.08)', drawBorder: false }, ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 } } },
                        x: { ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 }, maxRotation: -45, minRotation: -45 }, grid: { display: false } }
                    }
                }
            });
        }

        function renderConvBookingChart() {
            const ctx = document.getElementById('convBookingChart');
            if (!ctx) return;
            if (charts.convBooking) charts.convBooking.destroy();

            const labels = kpiData.map(w => w.weekLabel);
            const values = kpiData.map(w => w.convToBooking);

            charts.convBooking = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Conv to Booking %', data: values, borderColor: '#EC4899', backgroundColor: 'rgba(236, 72, 153, 0.08)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#EC4899', pointBorderColor: '#1A202C', pointBorderWidth: 2 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 50, grid: { color: 'rgba(255, 255, 255, 0.08)', drawBorder: false }, ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 } } },
                        x: { ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 11 }, maxRotation: -45, minRotation: -45 }, grid: { display: false } }
                    }
                }
            });
        }

        initWeekSelector();
        render();
    </script>
</body>
</html>
